name: Gerar cobrinha de contribuicoes

on:
  schedule:
    # roda a cada 6 horas (atualiza o desenho conforme voce commita)
    - cron: "0 */6 * * *"
  # permite rodar manualmente pela aba Actions
  workflow_dispatch:
  # roda a cada push na main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Gerar SVG da cobrinha (claro + escuro)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Publicar no branch output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
